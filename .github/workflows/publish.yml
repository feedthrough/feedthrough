name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter './packages/*' build
      - name: Publish changed packages
        run: |
          for pkg in packages/*/; do
            name=$(node -p "require('./${pkg}package.json').name")
            version=$(node -p "require('./${pkg}package.json').version")
            if npm view "${name}@${version}" version 2>/dev/null | grep -q "${version}"; then
              echo "skip  ${name}@${version} (already on npm)"
            else
              echo "publish  ${name}@${version}"
              pnpm --filter "${name}" publish --no-git-checks
            fi
          done

      # Publish @feedthrough/mcp to the official MCP registry whenever the registry
      # is missing the version currently in package.json. Gating on the registry
      # (rather than on "did npm publish this run") means a failed registry publish
      # can be retried by re-running this workflow, with no version bump needed.
      # server.json's version is kept in sync with package.json manually.
      - name: Check whether the MCP registry has the current version
        id: registry
        run: |
          version=$(node -p "require('./packages/mcp/package.json').version")
          count=$(curl -s "https://registry.modelcontextprotocol.io/v0.1/servers?search=io.github.feedthrough/feedthrough" \
            | jq -r --arg v "$version" '[.servers[].server | select(.version == $v)] | length' 2>/dev/null || echo 0)
          [ -z "$count" ] && count=0
          if [ "$count" -gt 0 ]; then
            echo "registry already has @feedthrough/mcp ${version}"
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "registry missing @feedthrough/mcp ${version}, will publish"
            echo "needs_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install mcp-publisher
        if: steps.registry.outputs.needs_publish == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP registry
        if: steps.registry.outputs.needs_publish == 'true'
        working-directory: packages/mcp
        run: |
          "$GITHUB_WORKSPACE/mcp-publisher" login github-oidc
          "$GITHUB_WORKSPACE/mcp-publisher" publish
