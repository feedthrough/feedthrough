name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter './packages/*' build
      - name: Publish changed packages
        id: npm
        run: |
          for pkg in packages/*/; do
            name=$(node -p "require('./${pkg}package.json').name")
            version=$(node -p "require('./${pkg}package.json').version")
            if npm view "${name}@${version}" version 2>/dev/null | grep -q "${version}"; then
              echo "skip  ${name}@${version} (already on npm)"
            else
              echo "publish  ${name}@${version}"
              pnpm --filter "${name}" publish --no-git-checks
              if [ "${name}" = "@feedthrough/mcp" ]; then
                echo "mcp_published=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          done

      # Publish @feedthrough/mcp to the official MCP registry, but only when a new
      # version of it was actually published above. server.json's version is kept in
      # sync with package.json manually.
      - name: Install mcp-publisher
        if: steps.npm.outputs.mcp_published == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP registry
        if: steps.npm.outputs.mcp_published == 'true'
        working-directory: packages/mcp
        run: |
          "$GITHUB_WORKSPACE/mcp-publisher" login github-oidc
          "$GITHUB_WORKSPACE/mcp-publisher" publish
